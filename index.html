<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoPoint</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>

<body>

<div class="container">

<header>

<h1>🌱 EcoPoint</h1>

<p>
Sistema de incentivos para el reciclaje mediante Blockchain
</p>

</header>

<section class="card">

<button id="connectButton">
🔗 Conectar MetaMask
</button>

<p id="wallet">
Billetera no conectada
</p>

</section>

<section class="card">

<h2>💰 Mis EcoPoints</h2>

<h3 id="balance">0</h3>

<button id="balanceButton">
Consultar saldo
</button>

</section>

<section class="card">

<h2>♻️ Asignar EcoPoints</h2>

<input
type="text"
id="awardAddress"
placeholder="Dirección del ciudadano">

<input
type="number"
id="awardAmount"
placeholder="Cantidad">

<button id="awardButton">

Asignar puntos

</button>

</section>

<section class="card">

<h2>🎁 Canjear EcoPoints</h2>

<input
type="text"
id="redeemAddress"
placeholder="Dirección del ciudadano">

<input
type="number"
id="redeemAmount"
placeholder="Cantidad">

<button id="redeemButton">

Canjear puntos

</button>

</section>

<footer>

<p>

Proyecto EcoPoint • Blockchain Ethereum Sepolia

</p>

</footer>

</div>

<script src="app.js"></script>

</body>

</html>
